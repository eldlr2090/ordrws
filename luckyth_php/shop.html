<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storefront | LuckyThrift</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>tailwind.config = { theme: { extend: { colors: { navy:'#003E7E', orange:'#F59231' } } } }</script>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden" data-page="shop">

<div id="global-loader" class="fixed inset-0 bg-white z-[999] flex items-center justify-center">
    <div class="text-center"><div class="loader-spin mx-auto mb-4"></div>
    <p class="text-navy font-black text-sm uppercase tracking-widest">Loading Catalog…</p></div>
</div>

<div id="nav-placeholder"></div>
<div id="auth-placeholder"></div>
<div id="toast-placeholder"></div>

<main class="pt-24 pb-20 max-w-7xl mx-auto px-4">

    <div class="flex flex-col md:flex-row md:items-center justify-between mb-10 gap-6 py-8">
        <div>
            <p class="text-xs font-black uppercase tracking-widest text-orange mb-1">LuckyThrift</p>
            <h1 class="text-4xl font-black text-navy">Full Catalog</h1>
            <p class="text-slate-400 text-sm mt-1">Click any item to see details and add it to your cart.</p>
        </div>
        <div class="flex items-center bg-white border-2 border-slate-200 rounded-2xl px-4 py-2 w-full md:w-96 focus-within:border-navy transition-all">
            <i data-lucide="search" class="text-slate-400 w-5 h-5 shrink-0"></i>
            <input type="text" id="search-input" onkeyup="handleSearch()"
                placeholder="Search items…"
                class="w-full bg-transparent border-none focus:outline-none px-4 py-2 font-bold text-navy placeholder:font-normal">
        </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8" id="storefront-grid">
        <!-- Skeletons while loading -->
        <div class="bg-white rounded-[2rem] border-2 border-slate-100 overflow-hidden animate-pulse"><div class="aspect-[4/5] bg-slate-200"></div><div class="p-6"><div class="h-4 bg-slate-200 rounded mb-3"></div><div class="h-6 bg-slate-200 rounded w-1/2"></div></div></div>
        <div class="bg-white rounded-[2rem] border-2 border-slate-100 overflow-hidden animate-pulse"><div class="aspect-[4/5] bg-slate-200"></div><div class="p-6"><div class="h-4 bg-slate-200 rounded mb-3"></div><div class="h-6 bg-slate-200 rounded w-1/2"></div></div></div>
        <div class="bg-white rounded-[2rem] border-2 border-slate-100 overflow-hidden animate-pulse hidden lg:block"><div class="aspect-[4/5] bg-slate-200"></div><div class="p-6"><div class="h-4 bg-slate-200 rounded mb-3"></div><div class="h-6 bg-slate-200 rounded w-1/2"></div></div></div>
        <div class="bg-white rounded-[2rem] border-2 border-slate-100 overflow-hidden animate-pulse hidden lg:block"><div class="aspect-[4/5] bg-slate-200"></div><div class="p-6"><div class="h-4 bg-slate-200 rounded mb-3"></div><div class="h-6 bg-slate-200 rounded w-1/2"></div></div></div>
    </div>

</main>

<script src="assets/js/api.js"></script>
<script src="assets/js/nav.js"></script>
<script src="assets/js/page-shop.js"></script>
</body>
</html>
